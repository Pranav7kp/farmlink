<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmLink | Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-6">
    <div class="bg-white w-full max-w-md rounded-[3rem] shadow-2xl p-8 overflow-hidden">
        
        <div class="flex p-2 bg-gray-100 rounded-2xl mb-8" id="tabBar">
            <button onclick="setMode('login')" id="lTab" class="flex-1 py-3 rounded-xl font-bold text-sm bg-white shadow text-emerald-600">Login</button>
            <button onclick="setMode('signup')" id="sTab" class="flex-1 py-3 rounded-xl font-bold text-sm text-gray-500">Sign Up</button>
        </div>

        <div id="loginForm" class="space-y-4">
            <input type="text" placeholder="Email/Mobile" class="w-full p-4 rounded-2xl bg-gray-50 border-0 outline-none focus:ring-2 focus:ring-emerald-500">
            <input type="password" placeholder="Password" class="w-full p-4 rounded-2xl bg-gray-50 border-0 outline-none focus:ring-2 focus:ring-emerald-500">
            <div class="text-right"><button onclick="showForgot()" class="text-xs font-bold text-emerald-600 uppercase">Forgot Password?</button></div>
            <button class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold shadow-lg">Sign In</button>
        </div>

        <div id="signupForm" class="hidden space-y-4">
            <input type="text" placeholder="Full Name" class="w-full p-4 rounded-2xl bg-gray-50 border-0 outline-none">
            <input type="email" placeholder="Email Address" class="w-full p-4 rounded-2xl bg-gray-50 border-0 outline-none">
            <input type="password" placeholder="Create Password" class="w-full p-4 rounded-2xl bg-gray-50 border-0 outline-none">
            <div class="text-[10px] text-gray-400 p-2">Sellers agree to a 10% platform commission.</div>
            <button class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold shadow-lg">Create Account</button>
        </div>

        <div id="forgotForm" class="hidden space-y-6">
            <h2 class="text-xl font-bold text-center">Reset Access</h2>
            <div id="otpStep1">
                <input type="email" placeholder="Registered Email" class="w-full p-4 rounded-2xl bg-gray-50 border-0 outline-none mb-4">
                <button onclick="toOtp()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold">Send OTP</button>
            </div>
            <div id="otpStep2" class="hidden text-center">
                <p class="text-xs text-gray-500 mb-4">Enter 4-digit code</p>
                <div class="flex justify-center gap-2 mb-6">
                    <input maxlength="1" class="w-12 h-12 text-center border-2 border-emerald-500 rounded-xl font-bold bg-white">
                    <input maxlength="1" class="w-12 h-12 text-center border-2 border-emerald-500 rounded-xl font-bold bg-white">
                    <input maxlength="1" class="w-12 h-12 text-center border-2 border-emerald-500 rounded-xl font-bold bg-white">
                    <input maxlength="1" class="w-12 h-12 text-center border-2 border-emerald-500 rounded-xl font-bold bg-white">
                </div>
                <button onclick="alert('Password Reset!'); location.reload();" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold">Verify OTP</button>
            </div>
            <button onclick="location.reload()" class="w-full text-xs font-bold text-gray-400">Back to Login</button>
        </div>
    </div>

    <script>
        function setMode(mode) {
            const isLogin = mode === 'login';
            document.getElementById('loginForm').classList.toggle('hidden', !isLogin);
            document.getElementById('signupForm').classList.toggle('hidden', isLogin);
            document.getElementById('lTab').className = isLogin ? "flex-1 py-3 rounded-xl font-bold text-sm bg-white shadow text-emerald-600" : "flex-1 py-3 rounded-xl font-bold text-sm text-gray-500";
            document.getElementById('sTab').className = !isLogin ? "flex-1 py-3 rounded-xl font-bold text-sm bg-white shadow text-emerald-600" : "flex-1 py-3 rounded-xl font-bold text-sm text-gray-500";
        }

        function showForgot() {
            document.getElementById('tabBar').classList.add('hidden');
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('forgotForm').classList.remove('hidden');
        }

        function toOtp() {
            document.getElementById('otpStep1').classList.add('hidden');
            document.getElementById('otpStep2').classList.remove('hidden');
        }

        // Handle URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('mode') === 'signup') setMode('signup');
    </script>
</body>
</html>
