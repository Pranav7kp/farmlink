<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | FarmLink</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div class="max-w-2xl mx-auto p-6">
        <button onclick="history.back()" class="flex items-center gap-2 text-gray-500 font-bold text-sm mb-6 uppercase tracking-wider">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M15 19l-7-7 7-7"></path></svg>
            Back to Market
        </button>

        <div class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden p-8 border border-white">
            <h2 class="text-3xl font-extrabold text-gray-800 mb-8">Secure Checkout</h2>

            <div class="bg-emerald-50 rounded-3xl p-6 mb-8 border border-emerald-100">
                <div class="flex justify-between items-center mb-4">
                    <h3 id="pName" class="text-xl font-bold text-emerald-900">Product Name</h3>
                    <span id="pPriceTotal" class="text-xl font-extrabold text-emerald-600">₹0</span>
                </div>
                <div class="space-y-2 text-sm text-emerald-800/70 font-semibold">
                    <p>Seller: <span id="pSellerName" class="text-emerald-900"></span></p>
                    <p>Platform Support: Included</p>
                </div>
            </div>

            <div class="space-y-5">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Delivery Address</label>
                    <textarea placeholder="House No, Street, Landmark..." class="w-full mt-1 p-4 rounded-2xl bg-gray-50 border-0 focus:ring-2 focus:ring-emerald-500 outline-none h-24"></textarea>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Quantity (KG)</label>
                        <input type="number" value="1" class="w-full mt-1 p-4 rounded-2xl bg-gray-50 border-0 outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Payment Method</label>
                        <select class="w-full mt-1 p-4 rounded-2xl bg-gray-50 border-0 outline-none">
                            <option>Cash on Delivery</option>
                            <option>Online Payment</option>
                        </select>
                    </div>
                </div>

                <div class="pt-6 border-t border-gray-100">
                    <div class="flex justify-between mb-6">
                        <span class="text-gray-400 font-bold uppercase text-xs">Total to Pay</span>
                        <span id="finalTotal" class="text-2xl font-extrabold text-gray-800">₹0</span>
                    </div>
                    <button onclick="alert('Order Placed Successfully! Farmer notified.')" class="w-full bg-emerald-600 text-white py-5 rounded-[2rem] font-bold text-lg shadow-xl shadow-emerald-200 active:scale-95 transition-all">
                        CONFIRM ORDER
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('name');
        const price = urlParams.get('price');
        const seller = urlParams.get('seller');

        document.getElementById('pName').innerText = name;
        document.getElementById('pSellerName').innerText = seller;
        document.getElementById('pPriceTotal').innerText = '₹' + price;
        document.getElementById('finalTotal').innerText = '₹' + price;
    </script>
</body>
</html>
